name: listen_psl
description: Pakistani Sign Language Recognition App
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Inference runs server-side over a WebSocket (see server/). The Flutter
  # app captures camera frames, encodes them to JPEG via the native
  # YuvJpegPlugin, and ships them to the server. We previously tried
  # on-device MediaPipe Tasks + TFLite but the Tasks API uses a different
  # hand model than mp.solutions.hands(model_complexity=0) which the
  # classifier was trained on, causing accuracy regression.

  # Camera feed
  camera: ^0.11.3
  camera_android: ^0.10.9
  camera_platform_interface: ^2.8.0

  # WebSocket client to the inference server
  web_socket_channel: ^3.0.1

  # Urdu TTS
  flutter_tts: ^4.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
