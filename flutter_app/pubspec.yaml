name: listen_psl
description: Pakistani Sign Language Recognition App
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # MediaPipe HandLandmarker and TFLite inference both run in native Kotlin modules
  # (see android/.../HandLandmarkerNativePlugin.kt, TfliteInferencePlugin.kt).
  # We dropped the `hand_landmarker` pub package because its YUV→JPEG→Bitmap roundtrip
  # is the bottleneck (~50ms/frame on A06) and it strips MediaPipe's handedness label.
  # We dropped `tflite_flutter` because its LiteRT runtime can't load Select TF ops
  # required by our LSTM (FlexTensorListReserve).

  # Camera feed
  camera: ^0.11.3
  camera_android: ^0.10.9
  camera_platform_interface: ^2.8.0

  # Urdu TTS
  flutter_tts: ^4.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
